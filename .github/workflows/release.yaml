name: Release
on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    outputs:
      VERSION_NUMBER: ${{ steps.output.outputs.VERSION_NUMBER }}
      CI_CREATE_IMAGE: ${{ steps.output.outputs.CI_CREATE_IMAGE }}
    steps:
      - uses: actions/checkout@v6
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10
      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ vars.DOCKERHUB_USERNAME }}
        run: pnpm --package semantic-release@23 --package @semantic-release/exec --package @semantic-release/changelog --package conventional-changelog-conventionalcommits@7.0.2 dlx semantic-release
      - name: Generate output
        id: output
        run: test -f "release.env" && cat release.env >> "$GITHUB_OUTPUT" || exit 0
  docker:
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.outputs.CI_CREATE_IMAGE == 'true' }}
    steps:
      - name: Set QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: actions/checkout@v6
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            VERSION=${{ needs.release.outputs.VERSION_NUMBER }}
          tags: "${{ vars.DOCKERHUB_USERNAME }}/xpferd:latest, ${{ vars.DOCKERHUB_USERNAME }}/xpferd:${{ needs.release.outputs.VERSION_NUMBER }}"
